<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動練習 - 伝える (Tsutaeru)</title>
    <style>
        :root {
            --primary-red: #c9171e;
            --primary-beige: #f5f5dc;
            --accent-blue: #0d3b66;
            --accent-pink: #f8b4d4;
            --accent-green: #7a9d6e;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans CJK TC', 'Microsoft JhengHei', sans-serif;
            background: var(--primary-beige);
            color: #333;
            line-height: 1.6;
        }

        /* ============ 導航列 ============ */
        nav {
            background: white;
            padding: 10px 20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            gap: 30px;
            gap: 30px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary-red);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 35px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--accent-blue);
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary-red);
        }

        .nav-cta {
            background: var(--primary-red);
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
        }

        .nav-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(201, 23, 30, 0.3);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ============ 頁面標題 ============ */
        .page-header {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, var(--primary-beige) 0%, #fff 100%);
            border-bottom: 5px solid var(--primary-red);
        }

        .page-header h1 {
            font-size: 3rem;
            color: var(--primary-red);
            margin-bottom: 15px;
        }

        .page-header p {
            font-size: 1.1rem;
            color: #666;
        }

        /* ============ 主要內容 ============ */
        .practice-section {
            padding: 60px 0;
        }

        .section-title {
            font-size: 1.8rem;
            color: var(--accent-blue);
            margin: 50px 0 30px;
            text-align: center;
            position: relative;
            padding-bottom: 20px;
        }

        .section-title::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: var(--primary-red);
            border-radius: 2px;
        }

        /* ============ 標籤頁 ============ */
        .tab-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 30px;
            border: 2px solid var(--accent-blue);
            background: white;
            color: var(--accent-blue);
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--primary-red);
            color: white;
            border-color: var(--primary-red);
        }

        .tab-btn:hover {
            transform: translateY(-2px);
        }

        /* ============ 書寫練習區 ============ */
        .writing-practice {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            margin-bottom: 50px;
        }

        .progress-section {
            margin-bottom: 30px;
        }

        .progress-label {
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary-red);
            border-radius: 5px;
            width: 65%;
        }

        .practice-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }

        .selection-area {
            background: linear-gradient(135deg, var(--primary-beige) 0%, rgba(248, 180, 212, 0.1) 100%);
            border: 2px solid var(--accent-pink);
            border-radius: 12px;
            padding: 25px;
        }

        .selection-area h3 {
            font-size: 1.1rem;
            color: var(--accent-blue);
            margin-bottom: 15px;
        }

        .character-buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .char-btn {
            padding: 12px;
            background: white;
            border: 2px solid var(--accent-pink);
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .char-btn:hover {
            background: var(--primary-red);
            color: white;
            border-color: var(--primary-red);
        }

        .char-btn.selected {
            background: var(--primary-red);
            color: white;
            border-color: var(--primary-red);
        }

        .writing-area {
            background: linear-gradient(135deg, white 0%, var(--primary-beige) 100%);
            border: 3px dashed var(--accent-pink);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .writing-area h3 {
            font-size: 1rem;
            color: #999;
            margin-bottom: 15px;
        }

        .writing-canvas {
            font-size: 4rem;
            font-weight: 900;
            color: var(--primary-red);
            margin-bottom: 15px;
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        .mode-btn {
            padding: 8px 15px;
            background: var(--accent-pink);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .mode-btn.active {
            background: var(--primary-red);
        }

        .mode-btn:hover {
            transform: translateY(-2px);
        }

        /* ============ 單詞卡學習區 ============ */
        .flashcard-section {
            display: none;
        }

        .flashcard-section.active {
            display: block;
        }

        .flashcard-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            margin-bottom: 50px;
        }

        .flashcard {
            background: linear-gradient(135deg, var(--primary-beige) 0%, rgba(248, 180, 212, 0.2) 100%);
            border: 3px solid var(--accent-pink);
            border-radius: 15px;
            padding: 60px 40px;
            text-align: center;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 30px;
        }

        .flashcard:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 50px rgba(0,0,0,0.12);
        }

        .flashcard-front {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .flashcard-image {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        .flashcard-word {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary-red);
            margin-bottom: 10px;
        }

        .flashcard-hint {
            font-size: 0.9rem;
            color: #999;
        }

        .flashcard-back {
            display: none;
        }

        .flashcard-back.show {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .flashcard-meaning {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--accent-blue);
            margin-bottom: 20px;
        }

        .flashcard-example {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: left;
        }

        .flashcard-example strong {
            color: var(--primary-red);
        }

        .flashcard-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .flashcard-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .flashcard-btn.primary {
            background: var(--primary-red);
            color: white;
        }

        .flashcard-btn.primary:hover {
            background: var(--accent-blue);
        }

        .flashcard-btn.secondary {
            background: var(--accent-pink);
            color: white;
        }

        .flashcard-btn.secondary:hover {
            background: var(--accent-green);
        }

        .card-counter {
            text-align: center;
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 20px;
        }

        .navigation-arrows {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .arrow-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary-red);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.3s;
        }

        .arrow-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(201, 23, 30, 0.3);
        }

        /* ============ 頁尾 ============ */
        footer {
            background: var(--accent-blue);
            color: white;
            padding: 40px 20px;
            text-align: center;
            margin-top: 80px;
        }

        footer p {
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        footer a {
            color: var(--accent-pink);
            text-decoration: none;
            margin: 0 10px;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* ============ 響應式設計 ============ */
        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 2rem;
            }

            .practice-grid {
                grid-template-columns: 1fr;
            }

            .character-buttons {
                grid-template-columns: repeat(4, 1fr);
            }

            .flashcard {
                padding: 40px 20px;
                min-height: 300px;
            }

            .flashcard-word {
                font-size: 1.8rem;
            }

            .writing-practice,
            .flashcard-container {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <!-- 導航列 -->
   <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663328630280/CJexFqIIRdXImBgh.png" alt="伝える (Tsutaeru)" style="height: 80px; width: auto;">
            </a>
            <ul class="nav-links">
                <li><a href="LH.html">學習中心</a></li>
                <li><a href="IP.html">互動練習</a></li>
                <li><a href="IoT.html">IoT 體驗</a></li>
                <li><a href="AU.html">關於我們</a></li>
                <li><a href="C.html">社群</a></li>
            </ul>
            <a href="UA.html">我的帳戶</a>
        </div>
    </nav>

    <!-- 頁面標題 -->
    <section class="page-header">
        <div class="container">
            <h1>✍️ 互動練習</h1>
            <p>智能書寫練習與圖像化單詞卡</p>
        </div>
    </section>

    <!-- 主要內容 -->
    <main class="container">
        <section class="practice-section">
            <!-- 標籤頁 -->
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('writing')">✍️ 書寫練習</button>
                <button class="tab-btn" onclick="switchTab('flashcard')">🎴 單詞卡</button>
            </div>

            <!-- 書寫練習區 -->
            <div id="writing" class="writing-practice">
                <h2 class="section-title">✍️ 假名書寫練習</h2>
                
                <div class="progress-section">
                    <div class="progress-label">今日進度：32/50 個字符</div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 64%;"></div>
                    </div>
                </div>

                <div class="practice-grid">
                    <div class="selection-area">
                        <h3>選擇要練習的字符</h3>
                        <div class="character-buttons">
                            <button class="char-btn">あ</button>
                            <button class="char-btn">い</button>
                            <button class="char-btn">う</button>
                            <button class="char-btn">え</button>
                            <button class="char-btn">お</button>
                            <button class="char-btn">か</button>
                            <button class="char-btn">き</button>
                            <button class="char-btn">く</button>
                            <button class="char-btn">け</button>
                            <button class="char-btn">こ</button>
                            <button class="char-btn">さ</button>
                            <button class="char-btn">し</button>
                            <button class="char-btn">す</button>
                            <button class="char-btn">せ</button>
                            <button class="char-btn">そ</button>
                        </div>
                    </div>

                    <div class="writing-area">
                        <h3>臨摹練習</h3>
                        <div class="writing-canvas">あ</div>
                        <div class="mode-selector">
                            <button class="mode-btn active">觀摩</button>
                            <button class="mode-btn">臨摹</button>
                            <button class="mode-btn">自由</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 單詞卡學習區 -->
            <div id="flashcard" class="flashcard-section">
                <h2 class="section-title">🎴 圖像化單詞卡</h2>
                
                <div class="flashcard-container">
                    <div class="card-counter">
                        <span id="cardNumber">1</span> / 10
                    </div>

                    <div class="flashcard" onclick="flipCard(this)">
                        <div class="flashcard-front">
                            <div class="flashcard-image">🍜</div>
                            <div class="flashcard-word">ラーメン</div>
                            <div class="flashcard-hint">點擊翻轉查看中文</div>
                        </div>
                        <div class="flashcard-back">
                            <div class="flashcard-meaning">拉麵</div>
                            <div class="flashcard-example">
                                <strong>例句：</strong><br>
                                「美味しいラーメンを食べました。」<br>
                                （我吃了好吃的拉麵。）
                            </div>
                        </div>
                    </div>

                    <div class="flashcard-controls">
                        <button class="flashcard-btn primary" onclick="markMastered()">✓ 已掌握</button>
                        <button class="flashcard-btn secondary" onclick="addToNotebook()">📝 加入生詞本</button>
                    </div>

                    <div class="navigation-arrows">
                        <button class="arrow-btn" onclick="previousCard()">←</button>
                        <button class="arrow-btn" onclick="nextCard()">→</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 頁尾 -->
    <footer>
        <p>&copy; 2026 伝える (Tsutaeru) — 香港首個 IoT 日語學習平台</p>
        <p>
            <a href="#">隱私政策</a> | 
            <a href="#">服務條款</a> | 
            <a href="#">聯絡我們</a>
        </p>
    </footer>

    <script>
        function switchTab(tabName) {
            // 隱藏所有標籤頁
            document.getElementById('writing').style.display = 'none';
            document.getElementById('flashcard').classList.remove('active');

            // 移除所有按鈕的 active 類
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));

            // 顯示選定的標籤頁
            if (tabName === 'writing') {
                document.getElementById('writing').style.display = 'block';
                buttons[0].classList.add('active');
            } else if (tabName === 'flashcard') {
                document.getElementById('flashcard').classList.add('active');
                buttons[1].classList.add('active');
            }
        }

        function flipCard(card) {
            const front = card.querySelector('.flashcard-front');
            const back = card.querySelector('.flashcard-back');
            front.style.display = front.style.display === 'none' ? 'flex' : 'none';
            back.classList.toggle('show');
        }

        function markMastered() {
            alert('✓ 已標記為掌握！');
            nextCard();
        }

        function addToNotebook() {
            alert('📝 已加入生詞本！');
        }

        function nextCard() {
            const counter = document.getElementById('cardNumber');
            let current = parseInt(counter.textContent);
            if (current < 10) {
                counter.textContent = current + 1;
            }
        }

        function previousCard() {
            const counter = document.getElementById('cardNumber');
            let current = parseInt(counter.textContent);
            if (current > 1) {
                counter.textContent = current - 1;
            }
        }
    </script>
</body>
</html>
